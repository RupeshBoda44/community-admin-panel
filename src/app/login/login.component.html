<div class="auth-wrapper">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="9" cy="7" r="4" stroke="#fff" stroke-width="2"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Community</h1>
      <p>Connect with your community</p>
    </div>

    <div class="form-section">
      <h2>Welcome Back! 👋</h2>
      <p class="subtitle">Enter your mobile number to continue</p>

      <form (ngSubmit)="onSubmit()">
        <div class="input-group">
          <div class="input-prefix">+91</div>
          <input
            type="tel"
            [(ngModel)]="mobile"
            name="mobile"
            placeholder="Mobile Number"
            maxlength="10"
            (input)="error=''"
            autofocus
          />
        </div>
        <div class="error-msg" *ngIf="error">{{ error }}</div>

        <button type="submit" class="btn-primary" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Send OTP</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <p class="terms">By logging in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>
  </div>
</div>
