<div class="auth-wrapper">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card">
    <div class="brand">
      <div class="back-btn" (click)="router.navigate(['/login'])">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="otp-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Verify OTP</h1>
      <p>OTP sent to +91 {{ mobile }}</p>
    </div>

    <div class="form-section">
      <h2>Enter OTP 🔐</h2>
      <p class="subtitle">Enter the 6-digit verification code</p>

      <div class="otp-wrapper">
        <ng-otp-input
          (onInputChange)="onOtpChange($event)"
          [config]="otpConfig">
        </ng-otp-input>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button class="btn-primary" (click)="verify()" [class.loading]="loading" [disabled]="loading">
        <span *ngIf="!loading">Verify & Continue</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="resend-section">
        <span *ngIf="!canResend" class="timer-text">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none"><circle cx="12" cy="12" r="10" stroke="#9ca3af" stroke-width="2"/><path d="M12 6v6l4 2" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/></svg>
          Resend in {{ timer }}s
        </span>
        <button *ngIf="canResend" class="resend-btn" (click)="resend()">Resend OTP</button>
      </div>
    </div>
  </div>
</div>
