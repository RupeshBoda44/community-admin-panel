<div class="drawer-overlay" [class.visible]="open" (click)="closeDrawer.emit()"></div>

<div class="drawer" [class.open]="open">
  <div class="drawer-header">
    <h2>Business Details</h2>
    <button class="close-btn" (click)="closeDrawer.emit()">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <ng-container *ngIf="business">
    <div class="drawer-body">
      <div class="business-profile">
        <div class="avatar" [style.background]="getColor(business.name)">
          {{ business.name?.[0]?.toUpperCase() }}
        </div>
        <div>
          <h3>{{ business.name }}</h3>
          <span class="badge" [class.active]="business.isActive">
            {{ business.isActive ? 'Active' : 'Inactive' }}
          </span>
        </div>
      </div>

      <div class="detail-list">
        <div class="detail-item">
          <span class="detail-label">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" stroke="currentColor" stroke-width="2"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z" stroke="currentColor" stroke-width="2"/></svg>
            Business Name
          </span>
          <span class="detail-value">{{ business.name }}</span>
        </div>

        <div class="detail-item">
          <span class="detail-label">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Status
          </span>
          <span class="detail-value">
            <span class="badge" [class.active]="business.isActive">
              {{ business.isActive ? 'Active' : 'Inactive' }}
            </span>
          </span>
        </div>

        <div class="detail-item" *ngIf="business.createdAt">
          <span class="detail-label">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Created At
          </span>
          <span class="detail-value">{{ business.createdAt | date: 'dd MMM yyyy' }}</span>
        </div>
      </div>
    </div>
  </ng-container>
</div>
