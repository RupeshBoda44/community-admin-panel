<div class="page-header">
  <div>
    <h1>Cast</h1>
    <p>Manage all cast categories</p>
  </div>
  <div class="header-actions">
    <button class="btn-add" (click)="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      Add Cast
    </button>
  </div>
</div>

<div class="table-card">
  <div class="spinner-overlay" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" class="data-table">

    <ng-container matColumnDef="index">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let item; let i = index">{{ getRowIndex(i) }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let item">{{ item.name }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let item">
        <span class="badge" [class.active]="item.isActive">
          {{ item.isActive ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <div class="action-btns">
          <button class="action-btn view" (click)="openDetail(item)" title="View">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
          <button class="action-btn edit" (click)="openEdit(item)" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="action-btn delete" (click)="confirmDelete(item)" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-state" colspan="4">No records found.</td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalRecords"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25, 50]"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>
</div>

<!-- Add/Edit Drawer -->
<div class="drawer-overlay" [class.visible]="formOpen" (click)="closeForm()"></div>
<div class="drawer" [class.open]="formOpen">
  <div class="drawer-header">
    <h2>{{ drawerMode === 'add' ? 'Add Cast' : 'Edit Cast' }}</h2>
    <button class="close-btn" (click)="closeForm()">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <form [formGroup]="form" class="drawer-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cast Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter cast name"/>
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="isActive">
        <mat-option [value]="true">Active</mat-option>
        <mat-option [value]="false">Inactive</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
  <div class="drawer-footer">
    <button class="btn-cancel" (click)="closeForm()">Cancel</button>
    <button class="btn-save" (click)="save()" [disabled]="saving">
      <span *ngIf="!saving">{{ drawerMode === 'add' ? 'Add' : 'Update' }}</span>
      <span *ngIf="saving" class="btn-spinner"></span>
    </button>
  </div>
</div>

<!-- Detail Drawer -->
<app-cast-drawer
  [cast]="detailItem"
  [open]="detailOpen"
  (closeDrawer)="closeDetail()">
</app-cast-drawer>
